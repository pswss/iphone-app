name: Oneul
options:
  bundleIdPrefix: com.oneul
  deploymentTarget:
    iOS: "26.0"
    watchOS: "11.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 8ZU657QBXU   # 사용자의 Personal Team (재생성 시 유지)
    ENABLE_PREVIEWS: YES
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad

targets:
  Oneul:
    type: application
    platform: iOS
    sources:
      - Oneul
      - Shared
    dependencies:
      - target: OneulWidget
        embed: true
      - target: OneulWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oneul.app
        CODE_SIGN_ENTITLEMENTS: Oneul.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    info:
      path: Generated/Oneul-Info.plist
      properties:
        CFBundleDisplayName: 오늘
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: 일정 장소를 현재 위치로 지정할 때 사용합니다.
        NSMicrophoneUsageDescription: 음성으로 일정을 입력할 때 마이크를 사용합니다.
        NSSpeechRecognitionUsageDescription: 말한 내용을 일정으로 바꿀 때 음성 인식을 사용합니다.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: com.oneul.app
            CFBundleURLSchemes: [oneul]

  OneulWidget:
    type: app-extension
    platform: iOS
    sources:
      - OneulWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oneul.app.widget
        CODE_SIGN_ENTITLEMENTS: OneulWidget.entitlements
    info:
      path: Generated/OneulWidget-Info.plist
      properties:
        CFBundleDisplayName: 오늘 위젯
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  OneulWatch:
    type: application
    platform: watchOS
    sources:
      - OneulWatch
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oneul.app.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: Generated/OneulWatch-Info.plist
      properties:
        CFBundleDisplayName: 오늘
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.oneul.app
